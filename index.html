<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epsilon</title>
    <link rel="icon" type="png/jpeg" href="favicon.png">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --bg: #ffffff;
    --text: #0d0d0d;
    --panel-bg: #ffffff;
    --bubble-user: #10a37f;
    --bubble-assistant: #f7f7f8;
    --border: #d1d5db;
}

body.dark-mode {
    --bg: #0d0d0d;
    --text: #ffffff;
    --panel-bg: #1a1a1a;
    --bubble-user: #10a37f;
    --bubble-assistant: #2a2a2a;
    --border: #333333;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background 0.3s ease, color 0.3s ease;
}

.container {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.header {
    text-align: center;
    padding: 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
}

.header h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
}

.header p {
    color: var(--text);
    opacity: 0.7;
    font-size: 14px;
}

.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.message {
    display: flex;
    gap: 12px;
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.message.user {
    justify-content: flex-end;
}

.message-content {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 15px;
    transition: background 0.3s ease, color 0.3s ease;
}

.message.assistant .message-content {
    background: var(--bubble-assistant);
    border: 1px solid var(--border);
}

.message.user .message-content {
    background: var(--bubble-user);
    color: #fff;
}

.input-area {
    padding: 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
}

.input-wrapper {
    display: flex;
    gap: 12px;
    max-width: 800px;
    margin: 0 auto;
}

#messageInput {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    max-height: 100px;
    transition: background 0.3s ease, color 0.3s ease;
}

#messageInput:focus {
    outline: none;
    border-color: #10a37f;
    box-shadow: 0 0 0 2px rgba(16, 163, 127, 0.1);
}

#sendBtn {
    padding: 12px 24px;
    background: #10a37f;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    transition: background 0.2s;
}

#sendBtn:hover {
    background: #0d8a6d;
}

#sendBtn:disabled {
    background: #ccc;
    cursor: not-allowed;
}

.welcome-message {
    text-align: center;
    color: var(--text);
    opacity: 0.7;
    padding: 40px 20px;
}

.welcome-message h2 {
    font-size: 24px;
    margin-bottom: 12px;
    color: var(--text);
}

.floating-buttons {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: row;
    gap: 12px;
    z-index: 9999;
}

.circle-btn {
    width: 42px;
    height: 42px;
    background: var(--bubble-assistant);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, border 0.3s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    position: relative;
}

.circle-btn:hover {
    background: var(--border);
}

.circle-btn svg {
    display: block;
    transition: stroke 0.2s ease;
}

.circle-btn:hover svg {
    stroke: #10a37f;
}

.circle-btn::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: -40px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel-bg);
    color: var(--text);
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 6px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
}

.circle-btn:hover::after {
    opacity: 1;
}

.settings-panel {
    position: fixed;
    top: 0;
    right: -300px;
    width: 300px;
    height: 100vh;
    background: var(--panel-bg);
    border-left: 1px solid var(--border);
    box-shadow: -2px 0 8px rgba(0,0,0,0.08);
    padding: 60px 20px 20px 20px;
    transition: right 0.3s ease, background 0.3s ease;
    z-index: 999999999;
}

.settings-panel.open {
    right: 0;
}

.settings-panel h2,
.settings-panel p {
    color: var(--text);
}

.close-btn {
    background: none;
    border: 1px solid var(--border);
    cursor: pointer;
    padding: 6px;
    position: absolute;
    top: 12px;
    right: 12px;
    border-radius: 6px;
    transition: background 0.2s, border 0.2s;
}

.close-btn:hover {
    background: #f0f0f0;
}

.close-btn svg {
    display: block;
    transition: stroke 0.2s ease;
}

.close-btn:hover svg {
    stroke: #10a37f;
}
    
@keyframes twirl {
    0% { transform: rotate(0deg); }
    60% { transform: rotate(200deg); }
    100% { transform: rotate(180deg); }
}

.circle-btn.twirl svg {
    animation: twirl 0.45s ease;
}

.setting-item {
    margin-top: 20px;
}

.toggle {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
}

.toggle input {
    display: none;
}

.slider {
    width: 40px;
    height: 20px;
    background: var(--border);
    border-radius: 20px;
    position: relative;
    transition: background 0.3s ease;
}

.slider::before {
    content: "";
    position: absolute;
    width: 16px;
    height: 16px;
    background: var(--bg);
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: transform 0.3s ease, background 0.3s ease;
}

.toggle input:checked + .slider {
    background: #10a37f;
}

.toggle input:checked + .slider::before {
    transform: translateX(20px);
}

.label-text {
    font-size: 14px;
    color: var(--text);
}

body.dark-mode .circle-btn svg {
    stroke: #ffffff;
}

body.dark-mode .circle-btn:hover svg {
    stroke: #10a37f;
}
    
body.dark-mode .close-btn {
    border-color: #555;
}

body.dark-mode .close-btn svg {
    stroke: #ffffff;
}

body.dark-mode .close-btn:hover svg {
    stroke: #10a37f;
}
    
</style>

</head>
<body>
    <div class="floating-buttons">   
        <div class="circle-btn" data-tooltip="Settings">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0d0d0d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33h.09a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51h.09a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82v.09a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path>
            </svg>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>Epsilon</h1>
            <p>NullAgent Interface</p>
        </div>

        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="welcome-message">
                    <h2>Welcome to Epsilon AI</h2>
                    <p>Your Free AI Agent</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="Ask Epsilon anything..."
                        autocomplete="off"
                    >
                    <button id="sendBtn">Send</button>
                </div>
            </div>

        </div>
    </div>
    
<div id="settingsPanel" class="settings-panel">
    <button id="closeSettings" class="close-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" stroke="#0d0d0d" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </button>
    <h2>Settings</h2>
    <p>Customize Epsilon to your liking.</p>
    <p>_____________________________</p>
<div class="setting-item">
    <label class="toggle">
        <input type="checkbox" id="darkModeToggle">
        <span class="slider"></span>
        <span class="label-text">Dark Mode</span>
    </label>
</div>

</div>

<script>
    const darkToggle = document.getElementById('darkModeToggle');

    darkToggle.addEventListener('change', () => {
        document.body.classList.toggle('dark-mode', darkToggle.checked);
    });

    const settingsBtn = document.querySelector('.circle-btn[data-tooltip="Settings"]');
    const settingsPanel = document.getElementById('settingsPanel');

    settingsBtn.addEventListener('click', () => {
        settingsBtn.classList.add('twirl');
        setTimeout(() => settingsBtn.classList.remove('twirl'), 450);

        settingsPanel.classList.toggle('open');
    });

    const closeSettings = document.getElementById('closeSettings');

    closeSettings.addEventListener('click', () => {
        settingsPanel.classList.remove('open');
    });

    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(content, isUser = false) {
        const messageEl = document.createElement('div');
        messageEl.className = 'message ' + (isUser ? 'user' : 'assistant');
        messageEl.innerHTML = '<div class="message-content">' + escapeHtml(content) + '</div>';

        if (messagesDiv.querySelector('.welcome-message')) {
            messagesDiv.innerHTML = '';
        }

        messagesDiv.appendChild(messageEl);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) return;

        messageInput.value = '';
        sendBtn.disabled = true;

        addMessage(message, true);
        addMessage('Thinking...', false);

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });

            const data = await response.json();
            
            // Remove the "Thinking..." message
            const thinkingMsg = messagesDiv.lastElementChild;
            if (thinkingMsg) thinkingMsg.remove();
            
            addMessage(data.response, false);
        } catch (err) {
            const thinkingMsg = messagesDiv.lastElementChild;
            if (thinkingMsg) thinkingMsg.remove();
            addMessage('Error: Could not reach Epsilon server', false);
        }

        sendBtn.disabled = false;
        messageInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    messageInput.focus();
</script>

</body>
</html>
